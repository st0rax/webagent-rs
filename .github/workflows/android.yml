name: Android (build check)

# Hinweis: Der eigentliche Android-Nutzungspfad ist der native Build unter
# Termux (aarch64-Linux, KEIN NDK/Cross-Toolchain noetig). Siehe README
# "Android (via GitHub)". Diese Pipeline beweist, dass der plattformneutrale
# Kern aus dem GitHub-Repo fehlerfrei kompiliert und die Tests gruen sind
# (äquivalent zum nativen Termux-Build).

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (plattformneutraler Kern)
        run: cargo build --release

      - name: Test
        run: cargo test --quiet
