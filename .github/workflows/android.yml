name: Android arm64 build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target aarch64-linux-android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cross (Docker-NBuild mit NDK-Sysroot)
        run: cargo install cross --locked

      - name: Build for Android arm64
        run: cross build --target aarch64-linux-android --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webagent-android-arm64
          path: target/aarch64-linux-android/release/webagent
