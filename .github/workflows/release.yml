name: release

# Builds release binaries on tag push (v*) and attaches them to the GitHub Release.
#
# Android (aarch64) release is deliberately NOT built here.
# Android-Release folgt nach Klärung lokaler-Browser/Termux (siehe MERGE_AND_PARITY.md).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Nur Windows: webagent baut auf WebView2 (Windows-only). Ein Linux-
          # Desktop-Binary ist ohne Portierung auf webkitgtk nicht moeglich, weil
          # `webview2-com-sys` die Windows-API (PCWSTR etc.) unbedingt einbindet.
          # Der CI-Kern (ci.yml) testet die Nicht-WebView-Logik separat auf Linux
          # via `--no-default-features`.
          - name: windows-x86_64
            # MSVC ist auf windows-latest vorinstalliert (Linker vorhanden); die
            # rein-Rust-Deps bauen damit ohne MinGW. Robuster als der GNU-Target auf CI.
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build_flags: --release
            artifact: target/release/webagent.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build ${{ matrix.build_flags }}

      # Windows: WebView2Loader.dll neben die exe (sonst 0xC0000135 auf manchen PCs)
      - name: Copy WebView2Loader.dll (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File scripts/copy-webview2-loader.ps1 -Profile release

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

      - name: Attach WebView2Loader.dll (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/WebView2Loader.dll
        continue-on-error: true
